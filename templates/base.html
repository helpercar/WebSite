<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Helpercar's Website{% endblock %}</title>
    <!-- Root-relative links prevent styles from breaking on sub-pages -->
    <link rel="stylesheet" href="{{ path_base }}style.css">
    <script src="{{ path_base }}script.js"></script>
</head>
<body>
    <nav>
        <ul class="tab-menu">
            <button class="tab-item" onclick="switchTab('{{ path_base }}')">Home</button>
            <button class="tab-item" onclick="switchTab('{{ path_base }}Projects')">Projects</button>
            <button class="tab-item" onclick="switchTab('{{ path_base }}Services')">Services</button>
        </ul>
    </nav>

    <main class="container">
        <!-- Main dynamic content injects here -->
        {% block content %}
        <p>This is default content. It shows if the child doesn't override it.</p>
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 My Website Framework</p>
    </footer>
</body>
</html>
